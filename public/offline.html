<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Campusly Offline</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f4f7f3; color: #14211f; font: 16px Arial, sans-serif; }
      main { width: min(82vw, 360px); padding: 28px; border-radius: 28px; background: #fff; box-shadow: 0 20px 60px rgba(30,70,62,.12); }
      h1 { margin: 0 0 8px; font-size: 26px; }
      p { margin: 0; color: #6d7d7a; line-height: 1.6; }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Your saved campus data is still available. Reconnect to refresh the latest updates.</p>
    </main>
  </body>
</html>
